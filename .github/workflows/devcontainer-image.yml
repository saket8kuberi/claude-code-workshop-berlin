name: Build dev container image

# Builds the workshop dev container and pushes it to GHCR so each
# participant's Codespace pulls a ready image instead of building one.
# Uses the built-in GITHUB_TOKEN — no personal tokens or secrets needed.

on:
  push:
    branches: [main]
    # Only rebuild when something that affects the image actually changes.
    paths:
      - ".devcontainer/**"
      - "templates/portfolio/package.json"
      - "templates/portfolio/package-lock.json"
      - "templates/landing/package.json"
      - "templates/landing/package-lock.json"
      - ".github/workflows/devcontainer-image.yml"
  workflow_dispatch: {} # lets you trigger a rebuild by hand from the Actions tab

permissions:
  contents: read
  packages: write # lets GITHUB_TOKEN push to GHCR

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Work out image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/cc-workshop-devcontainer
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/Dockerfile
          platforms: linux/amd64 # matches GitHub Codespaces
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
